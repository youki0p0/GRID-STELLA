<html lang="en">

<style>
  html, body { margin: 0; }
  body { background: var(--ink-950); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }

<body class="gs-root gs-starfield">

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { ItemCard, StatBar } = window.GRIDSTELLADesignSystem_88868c;
    function Demo() {
      return (
        <div>
          <div className="grid">
            <ItemCard icon="📌" nameJa="観測針" nameEn="Navigator Needle" type="weapon" width={1} height={1} attack={4} cooldown={2.0} cost={3} />
