<!-- @dsCard group="Colors" viewport="700x150" name="Gold — the instrument inlay" subtitle="One metallic gold as a tonal scale; used like engraving" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--ink-950);padding:18px;display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:70px;height:96px;border-radius:var(--radius-sm);display:flex;flex-direction:column;
      justify-content:flex-end;padding:8px;border:1px solid var(--gold-line-20)}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--ink-950);font-weight:700}
  .h{font-family:var(--font-mono);font-size:9px;color:rgba(0,0,0,0.6)}
  .dk .n{color:var(--gold-100)} .dk .h{color:var(--stone-400)}
</style></head>
<body class="gs-root">
  <div class="sw" style="background:var(--gold-50)"><span class="n">gold-50</span><span class="h">#faf3da</span></div>
  <div class="sw" style="background:var(--gold-100)"><span class="n">100</span><span class="h">#f3e6b8</span></div>
  <div class="sw" style="background:var(--gold-200)"><span class="n">200</span><span class="h">#e7cf86</span></div>
  <div class="sw" style="background:var(--gold-300)"><span class="n">300·accent</span><span class="h">#dab94f</span></div>
  <div class="sw" style="background:var(--gold-400)"><span class="n">400·core</span><span class="h">#cda736</span></div>
  <div class="sw" style="background:var(--gold-500)"><span class="n">500</span><span class="h">#b98f28</span></div>
  <div class="sw dk" style="background:var(--gold-600)"><span class="n">600</span><span class="h">#926e1d</span></div>
  <div class="sw dk" style="background:var(--gold-700)"><span class="n">700</span><span class="h">#6b4f15</span></div>
</body></html>
