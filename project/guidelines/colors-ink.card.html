<!-- @dsCard group="Colors" viewport="700x150" name="Ink — the black ground" subtitle="Charcoal-to-void surfaces; everything sits on ink" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--ink-950);padding:18px;display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:70px;height:96px;border-radius:var(--radius-sm);display:flex;flex-direction:column;
      justify-content:flex-end;padding:8px;border:1px solid var(--gold-line-20)}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--gold-100);font-weight:700}
  .h{font-family:var(--font-mono);font-size:9px;color:var(--stone-400)}
</style></head>
<body class="gs-root">
  <div class="sw" style="background:var(--ink-pure)"><span class="n">ink-pure</span><span class="h">#000000</span></div>
  <div class="sw" style="background:var(--ink-950)"><span class="n">950·page</span><span class="h">#060607</span></div>
  <div class="sw" style="background:var(--ink-900)"><span class="n">900·panel</span><span class="h">#0b0b0d</span></div>
  <div class="sw" style="background:var(--ink-850)"><span class="n">850</span><span class="h">#111114</span></div>
  <div class="sw" style="background:var(--ink-800)"><span class="n">800·card</span><span class="h">#17171b</span></div>
  <div class="sw" style="background:var(--ink-750)"><span class="n">750·raised</span><span class="h">#1e1e23</span></div>
  <div class="sw" style="background:var(--ink-700)"><span class="n">700·well</span><span class="h">#26262c</span></div>
</body></html>
