<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--ink-950);padding:22px 26px;display:flex;gap:40px;flex-wrap:wrap}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:0.1em;margin-bottom:8px}
</style></head>
<body class="gs-root">
  <div>
    <div class="meta">var(--font-ui) · Zen Kaku Gothic New</div>
    <div style="font-family:var(--font-ui);font-size:16px;color:var(--text-primary)">Align the instruments. 観測針を配置せよ。</div>
    <div style="font-family:var(--font-ui);font-size:13px;color:var(--text-muted);margin-top:6px">Secondary UI text — captions and helper copy.</div>
  </div>
  <div>
    <div class="meta">var(--font-mono) · Space Mono</div>
    <div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--text-gold)">⚔ 16  ◔ 4.5s  ◈ 8</div>
    <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);margin-top:6px">[1.2s] 観測針の調律攻撃！5 DMG</div>
  </div>
</body></html>
